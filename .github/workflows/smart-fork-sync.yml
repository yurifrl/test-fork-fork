name: Smart Fork Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  repository_dispatch:
    types: [upstream_changed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then
            UPSTREAM_REPO=$(gh api repos/${{ github.repository }} --jq '.parent.full_name // empty')
            if [ -z "$UPSTREAM_REPO" ]; then
              echo "::error::No upstream repo found. Set UPSTREAM_REPO variable or ensure this is a GitHub fork."
              exit 1
            fi
          fi
          echo "UPSTREAM_REPO=$UPSTREAM_REPO" >> $GITHUB_ENV
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for upstream changes
        id: check
        run: |
          if git merge-base --is-ancestor upstream/main main 2>/dev/null; then
            echo "already_synced=true" >> $GITHUB_OUTPUT
            echo "✅ Fork is already up to date with upstream"
          else
            echo "already_synced=false" >> $GITHUB_OUTPUT
            echo "🔄 Upstream has new changes"
            git log --oneline main..upstream/main
          fi

      - name: Attempt rebase
        if: steps.check.outputs.already_synced == 'false'
        id: rebase
        run: |
          git checkout -b sync-upstream main
          if git rebase upstream/main 2>&1; then
            echo "conflict=false" >> $GITHUB_OUTPUT
            echo "✅ Rebase succeeded cleanly"
          else
            git rebase --abort
            echo "conflict=true" >> $GITHUB_OUTPUT
            echo "⚠️ Rebase has conflicts, will use Claude to resolve"
          fi

      - name: Install Claude CLI
        if: steps.check.outputs.already_synced == 'false' && steps.rebase.outputs.conflict == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Claude resolve conflicts
        if: steps.check.outputs.already_synced == 'false' && steps.rebase.outputs.conflict == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          git checkout main
          git branch -D sync-upstream
          git checkout -b sync-upstream main

          # Start rebase
          git rebase upstream/main 2>&1 || true

          MAX_ATTEMPTS=20
          ATTEMPT=0

          while [ -d ".git/rebase-merge" ] || [ -d ".git/rebase-apply" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ "$ATTEMPT" -gt "$MAX_ATTEMPTS" ]; then
              echo "::error::Too many rebase steps, aborting"
              git rebase --abort
              exit 1
            fi

            CONFLICTED=$(git diff --name-only --diff-filter=U)
            if [ -z "$CONFLICTED" ]; then
              GIT_EDITOR=true git rebase --continue 2>&1 || true
              continue
            fi

            echo "🤖 Asking Claude to resolve conflicts in: $CONFLICTED"

            # Use claude with proper permissions and constrained tools
            claude -p \
              --permission-mode bypassPermissions \
              --allowedTools "Edit,View,Bash(git add *),Bash(cat *)" \
              --max-turns 5 \
              "Resolve the git rebase conflicts in these files: $CONFLICTED

          Rules:
          - Read each conflicted file with View
          - Remove ALL conflict markers (<<<<<<< HEAD, =======, >>>>>>> ...)
          - Keep BOTH upstream and fork content merged intelligently
          - Fork customizations take priority when they truly conflict
          - After editing each file, run: git add <filename>

          Do it now. No explanation needed."

            # Verify resolution
            STILL_CONFLICTED=$(git diff --name-only --diff-filter=U)
            if [ -n "$STILL_CONFLICTED" ]; then
              echo "::error::Claude could not resolve: $STILL_CONFLICTED"
              git rebase --abort
              exit 1
            fi

            GIT_EDITOR=true git rebase --continue 2>&1 || true
          done

          echo "✅ All conflicts resolved"

      - name: Create PR
        if: steps.check.outputs.already_synced == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push -f origin sync-upstream

          EXISTING_PR=$(gh pr list --head sync-upstream --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "📝 Updated existing PR #$EXISTING_PR"
          else
            gh pr create \
              --title "🔄 Sync with upstream" \
              --body "## Smart Fork Sync

          Rebased fork commits on top of latest upstream changes from \`${{ env.UPSTREAM_REPO }}\`.

          ### Upstream commits
          \`\`\`
          $(git log --oneline $(git merge-base origin/main upstream/main)..upstream/main)
          \`\`\`

          *Auto-generated by smart-fork sync*" \
              --head sync-upstream \
              --base main
          fi
