name: Smart Fork Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  repository_dispatch:
    types: [upstream_changed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and check changes
        id: check
        run: |
          # Auto-detect upstream from GitHub fork API
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then
            UPSTREAM_REPO=$(gh api repos/${{ github.repository }} --jq '.parent.full_name // empty')
          fi
          if [ -z "$UPSTREAM_REPO" ]; then
            echo "::error::Not a fork and UPSTREAM_REPO not set"
            exit 1
          fi
          echo "UPSTREAM_REPO=$UPSTREAM_REPO" >> $GITHUB_ENV
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream

          if git merge-base --is-ancestor upstream/main main 2>/dev/null; then
            echo "synced=true" >> $GITHUB_OUTPUT
            echo "✅ Already up to date"
          else
            echo "synced=false" >> $GITHUB_OUTPUT
            echo "🔄 New upstream changes:"
            git log --oneline main..upstream/main
          fi

      - name: Rebase fork on upstream
        if: steps.check.outputs.synced == 'false'
        id: rebase
        run: |
          git checkout -b sync-upstream main

          if git rebase upstream/main 2>&1; then
            echo "conflict=false" >> $GITHUB_OUTPUT
          else
            git rebase --abort
            echo "conflict=true" >> $GITHUB_OUTPUT
          fi

      - name: Claude resolve conflicts
        if: steps.check.outputs.synced == 'false' && steps.rebase.outputs.conflict == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm install -g @anthropic-ai/claude-code

          git checkout main
          git branch -D sync-upstream
          git checkout -b sync-upstream main
          git rebase upstream/main 2>&1 || true

          MAX=20; I=0
          while [ -d ".git/rebase-merge" ] || [ -d ".git/rebase-apply" ]; do
            I=$((I + 1))
            [ "$I" -gt "$MAX" ] && { echo "::error::Too many rebase steps"; git rebase --abort; exit 1; }

            CONFLICTED=$(git diff --name-only --diff-filter=U)
            if [ -z "$CONFLICTED" ]; then
              GIT_EDITOR=true git rebase --continue 2>&1 || true
              continue
            fi

            echo "🤖 Claude resolving: $CONFLICTED"
            claude -p \
              --permission-mode bypassPermissions \
              --allowedTools "Edit,View,Bash(git add *),Bash(cat *)" \
              --max-turns 5 \
              "Resolve git rebase conflicts in: $CONFLICTED
            Read each file, remove ALL conflict markers, merge both sides intelligently (fork customizations win on true conflicts), then git add each file."

            STILL=$(git diff --name-only --diff-filter=U)
            if [ -n "$STILL" ]; then
              echo "::error::Unresolved: $STILL"
              git rebase --abort
              exit 1
            fi
            GIT_EDITOR=true git rebase --continue 2>&1 || true
          done
          echo "✅ Conflicts resolved"

      - name: Push and create PR
        if: steps.check.outputs.synced == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git push -f origin sync-upstream

          EXISTING=$(gh pr list --head sync-upstream --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "📝 Updated existing PR #$EXISTING"
          else
            # Build body safely
            UPSTREAM_LOG=$(git log --oneline "$(git merge-base origin/main upstream/main)..upstream/main" 2>/dev/null || echo "unable to compute")
            BODY=$(cat <<EOF
          ## Smart Fork Sync

          Rebased fork commits on top of **${UPSTREAM_REPO}**.

          ### Upstream commits
          \`\`\`
          ${UPSTREAM_LOG}
          \`\`\`

          *Auto-generated by smart-fork sync*
          EOF
          )
            gh pr create --title "🔄 Sync with upstream" --body "$BODY" --head sync-upstream --base main
          fi
